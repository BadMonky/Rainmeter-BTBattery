[Rainmeter]
Update=1000
AccurateText=1

[mController]
Measure=Plugin
Plugin=BTBattery
DeviceName=DualSense Wireless Controller
MatchMode=Exact
PollSeconds=30
EnableLogging=0

[mEarbuds]
Measure=Plugin
Plugin=BTBattery
DeviceName=Nothing Ear (a)
MatchMode=Exact
PollSeconds=30
EnableLogging=0

[mKeyboard]
Measure=Plugin
Plugin=BTBattery
DeviceName=CHERRY KW X ULP MINI
MatchMode=Exact
PollSeconds=30
EnableLogging=0

[mMouse]
Measure=Plugin
Plugin=BTBattery
DeviceName=KeyChron M3 mini 4K
MatchMode=Exact
PollSeconds=30
EnableLogging=0

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,300,116,4 | Fill Color 24,24,24,230 | StrokeWidth 0

[Controller]
Meter=String
MeasureName=mController
X=12
Y=12
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255,255
AntiAlias=1
Text=Controller: %1%

[Earbuds]
Meter=String
MeasureName=mEarbuds
X=12
Y=36
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255,255
AntiAlias=1
Text=Earbuds: %1%

[Keyboard]
Meter=String
MeasureName=mKeyboard
X=12
Y=60
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255,255
AntiAlias=1
Text=Keyboard: %1%

[Mouse]
Meter=String
MeasureName=mMouse
X=12
Y=84
FontFace=Segoe UI
FontSize=12
FontColor=255,255,255,255
AntiAlias=1
Text=Mouse: %1%
