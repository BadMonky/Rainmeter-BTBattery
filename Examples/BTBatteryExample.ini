[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Metadata]
Name=BTBatteryExample
Author=BadMonky
Information=Example skin for the BTBattery Rainmeter plugin.
License=MIT
Version=1.0.0

[Variables]
; Edit these names to match Windows Bluetooth & devices settings.
Device1Name=DualSense Wireless Controller
Device1Label=Controller

Device2Name=Nothing Ear (a)
Device2Label=Earbuds

Device3Name=CHERRY KW X ULP MINI
Device3Label=Keyboard

Device4Name=KeyChron M3 mini 4K
Device4Label=Mouse

PollSeconds=30

Width=345
Height=182
Pad=16
HeaderY=12
RowPitch=30
Row1Y=56
Row2Y=(#Row1Y#+#RowPitch#)
Row3Y=(#Row1Y#+(#RowPitch#*2))
Row4Y=(#Row1Y#+(#RowPitch#*3))
BarX=90
ValueX=(#Width#-#Pad#)
BarWidth=198
BarHeight=8
TextColor=245,247,250,255
MutedText=155,164,176,255
PanelColor=18,20,24,238
TrackColor=48,54,62,255
AccentColor=83,199,130,255
WarnColor=238,190,92,255
CriticalColor=234,91,91,255

; Measures ---------------------------------------------------------------

[mBattery1]
Measure=Plugin
Plugin=BTBattery
DeviceName=#Device1Name#
PollSeconds=#PollSeconds#
MaxValue=100

[mBattery2]
Measure=Plugin
Plugin=BTBattery
DeviceName=#Device2Name#
PollSeconds=#PollSeconds#
MaxValue=100

[mBattery3]
Measure=Plugin
Plugin=BTBattery
DeviceName=#Device3Name#
PollSeconds=#PollSeconds#
MaxValue=100

[mBattery4]
Measure=Plugin
Plugin=BTBattery
DeviceName=#Device4Name#
PollSeconds=#PollSeconds#
MaxValue=100

; Styles -----------------------------------------------------------------

[StyleLabel]
FontFace=Segoe UI
FontSize=10
FontColor=#TextColor#
AntiAlias=1
StringAlign=Left
ClipString=1

[StyleValue]
FontFace=Segoe UI
FontSize=10
FontColor=#TextColor#
AntiAlias=1
StringAlign=Right

[StyleBar]
W=#BarWidth#
H=#BarHeight#
BarOrientation=Horizontal
BarColor=#AccentColor#
SolidColor=#TrackColor#

; Meters -----------------------------------------------------------------

[Background]
Meter=Shape
Shape=Rectangle 0,0,#Width#,#Height#,6 | Fill Color #PanelColor# | StrokeWidth 0

[Title]
Meter=String
X=#Pad#
Y=#HeaderY#
FontFace=Segoe UI Semibold
FontSize=12
FontColor=#TextColor#
AntiAlias=1
Text=Bluetooth Battery
ToolTipText=Edit Devices
LeftMouseUpAction=["#CURRENTPATH##CURRENTCONFIG#.ini"]

[GitHub]
Meter=String
X=(#Width#-60)
Y=r
FontFace=Segoe UI Semibold
FontSize=12
FontColor=#MutedText#
AntiAlias=1
Text=?
ToolTipText=Open README
LeftMouseUpAction=["https://github.com/BadMonky/Rainmeter-BTBattery"]

[Devices]
Meter=Shape
X=(#Width#-36)
Y=r
W=24
H=24
Shape=Rectangle 0,0,24,24,4 | Fill Color 0,0,0,1 | StrokeWidth 0
Shape2=Line 7,8,17,8 | Stroke Color #MutedText# | StrokeWidth 1.8
Shape3=Line 7,12,17,12 | Stroke Color #MutedText# | StrokeWidth 1.8
Shape4=Line 7,16,17,16 | Stroke Color #MutedText# | StrokeWidth 1.8
LeftMouseUpAction=["ms-settings:connecteddevices"]
ToolTipText=Open Bluetooth devices

[Label1]
Meter=String
MeterStyle=StyleLabel
X=#Pad#
Y=#Row1Y#
W=92
H=18
Text=#Device1Label#

[Bar1]
Meter=Bar
MeterStyle=StyleBar
MeasureName=mBattery1
X=#BarX#
Y=(#Row1Y#+5)

[Value1]
Meter=String
MeterStyle=StyleValue
MeasureName=mBattery1
X=#ValueX#
Y=#Row1Y#
Text=%1%

[Label2]
Meter=String
MeterStyle=StyleLabel
X=#Pad#
Y=#Row2Y#
W=92
H=18
Text=#Device2Label#

[Bar2]
Meter=Bar
MeterStyle=StyleBar
MeasureName=mBattery2
X=#BarX#
Y=(#Row2Y#+5)

[Value2]
Meter=String
MeterStyle=StyleValue
MeasureName=mBattery2
X=#ValueX#
Y=#Row2Y#
Text=%1%

[Label3]
Meter=String
MeterStyle=StyleLabel
X=#Pad#
Y=#Row3Y#
W=92
H=18
Text=#Device3Label#

[Bar3]
Meter=Bar
MeterStyle=StyleBar
MeasureName=mBattery3
X=#BarX#
Y=(#Row3Y#+5)

[Value3]
Meter=String
MeterStyle=StyleValue
MeasureName=mBattery3
X=#ValueX#
Y=#Row3Y#
Text=%1%

[Label4]
Meter=String
MeterStyle=StyleLabel
X=#Pad#
Y=#Row4Y#
W=92
H=18
Text=#Device4Label#

[Bar4]
Meter=Bar
MeterStyle=StyleBar
MeasureName=mBattery4
X=#BarX#
Y=(#Row4Y#+5)

[Value4]
Meter=String
MeterStyle=StyleValue
MeasureName=mBattery4
X=#ValueX#
Y=#Row4Y#
Text=%1%








